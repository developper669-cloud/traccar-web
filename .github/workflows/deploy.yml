name: CI/CD — Build, Push & Deploy

on:
  push:
    branches:
      - master
      - deploy
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy même sans changement de code'
        required: false
        default: 'false'
        type: boolean

env:
  REGISTRY_URL: ${{ secrets.REGISTRY_URL }}        # ex: docker.io | ghcr.io | registry.mondomaine.com
  REGISTRY_IMAGE: ${{ secrets.REGISTRY_IMAGE }}    # ex: monorg/traccar-web
  VPS_HOST: ${{ secrets.VPS_HOST }}
  VPS_USER: ${{ secrets.VPS_USER }}
  VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
  DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/traccar-web' }}

# Eviter les runs parallèles sur la même branche (annule le précédent)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ══════════════════════════════════════════════════════════════════════════
  # JOB 1 — Build & Push (lint déjà couvert par lint.yml existant)
  # ══════════════════════════════════════════════════════════════════════════
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build.outputs.digest }}
      image_full: ${{ env.REGISTRY_URL }}/${{ env.REGISTRY_IMAGE }}:${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_URL }}/${{ env.REGISTRY_IMAGE }}
          flavor: |
            latest=auto
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
          labels: |
            org.opencontainers.image.title=traccar-web
            org.opencontainers.image.description=Traccar Web UI
            org.opencontainers.image.vendor=traccar

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          # Cache layers GitHub Actions (rebuild ~50% plus rapide)
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          # Build args si besoin (ex: VITE_API_URL)
          build-args: |
            BUILDTIME=${{ github.event.head_commit.timestamp }}
            VERSION=${{ github.sha }}

      - name: Image digest
        run: |
          echo "### Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags:** \`${{ steps.meta.outputs.tags }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 2 — Deploy to VPS
  # ══════════════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-push
    if: |
      github.ref == 'refs/heads/master' ||
      github.ref == 'refs/heads/deploy'  ||
      github.event_name == 'workflow_dispatch'
    environment:
      name: production
      url: ${{ secrets.APP_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy compose files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ env.VPS_PORT }}
          source: "docker-compose.yml,docker-compose.prod.yml"
          target: ${{ env.DEPLOY_PATH }}
          strip_components: 0

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ env.VPS_PORT }}
          script: |
            set -euo pipefail

            COMPOSE_FILES="-f docker-compose.yml -f docker-compose.prod.yml"

            # ── 1. Login registry ─────────────────────────────────────────
            echo "${{ secrets.REGISTRY_PASSWORD }}" | \
              docker login "${{ env.REGISTRY_URL }}" \
                -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

            # ── 2. Réseau Docker partagé ──────────────────────────────────
            docker network inspect traccar-net >/dev/null 2>&1 || \
              docker network create traccar-net

            # ── 3. Mise à jour des fichiers compose + .env ────────────────
            cd "${{ env.DEPLOY_PATH }}"

            cat > .env << EOF
            REGISTRY_URL=${{ env.REGISTRY_URL }}
            REGISTRY_IMAGE=${{ env.REGISTRY_IMAGE }}
            IMAGE_TAG=${{ needs.build-push.outputs.image_tag }}
            EOF

            # ── 4. Pull de la nouvelle image ──────────────────────────────
            IMAGE_FULL="${{ needs.build-push.outputs.image_full }}"
            echo "Pulling ${IMAGE_FULL} ..."
            docker compose ${COMPOSE_FILES} pull

            # ── 5. Déploiement (--wait respecte le HEALTHCHECK) ───────────
            docker compose ${COMPOSE_FILES} up -d --remove-orphans --wait

            # ── 6. Vérification santé ─────────────────────────────────────
            echo "=== Container status ==="
            docker compose ${COMPOSE_FILES} ps traccar-web

            HEALTH=$(docker inspect --format='{{.State.Health.Status}}' traccar-web 2>/dev/null || echo "no-healthcheck")
            echo "Health: ${HEALTH}"
            if [ "${HEALTH}" = "unhealthy" ]; then
              echo "Container unhealthy — rollback!"
              docker compose ${COMPOSE_FILES} down
              exit 1
            fi

            # ── 7. Nettoyage images périmées ──────────────────────────────
            docker image prune -f

            echo "✅ Deploy OK — ${IMAGE_FULL}"

      - name: Deployment summary
        if: success()
        run: |
          echo "### Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`${{ needs.build-push.outputs.image_full }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest:** \`${{ needs.build-push.outputs.image_digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** ${{ secrets.APP_URL }}" >> $GITHUB_STEP_SUMMARY
