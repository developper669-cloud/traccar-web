# Override production
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  traccar-web:
    restart: always
    ports:
      - "3000:80"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
